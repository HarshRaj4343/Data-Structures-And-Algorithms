name: Bug report
description: Report a problem with repository structure, code, or scripts.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the issue clearly and include the affected file or folder.
      placeholder: The compile command fails for src/cpp/arrays/arrays4.cpp ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the commands or actions needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The file should compile successfully.
    validations:
      required: true
